version: '3.8'

services:
  gemini-bot:
    build: .
    container_name: gemini-cli-telegram
    restart: always
    volumes:
      - gemini-data:/root/.gemini-cli-telegram
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - LOG_LEVEL=info
      # Add other environment variables as needed
      # - GEMINI_API_KEY=${GEMINI_API_KEY}
      # - GEMINI_MODEL=${GEMINI_MODEL}

volumes:
  gemini-data:
